name: time-platform
label: Time
kind: platform
version: 1.0.0
description: >
  Time (Т‑Банк) corporate messenger adapter for Hermes Agent.
  Time is Mattermost-based; this adapter subclasses the Mattermost adapter
  and points it at Time's server. Inbound uses REST long-polling because
  Time's proxy blocks the Mattermost WebSocket.
author: densin
requires_env:
  - name: TIME_BOT_TOKEN
    description: "Mattermost bot/personal-access token for Time"
    prompt: "Time bot token"
    password: true
  - name: TIME_API_BASE_URL
    description: "Time server base URL (e.g. https://time.tbank.ru)"
    prompt: "Time server URL"
    password: false
optional_env:
  - name: TIME_ALLOWED_USERS
    description: "Comma-separated Time user IDs allowed to talk to the bot"
    prompt: "Allowed users (comma-separated)"
    password: false
  - name: TIME_ALLOW_ALL_USERS
    description: "Allow anyone to talk to the bot (dev only)"
    prompt: "Allow all users? (true/false)"
    password: false
  - name: TIME_HOME_CHANNEL
    description: "Channel ID for cron / notification delivery"
    prompt: "Home channel ID (or empty)"
    password: false
  - name: TIME_POLL_INTERVAL
    description: "REST poll interval in seconds (default 3)"
    prompt: "Poll interval seconds"
    password: false
